openapi: 3.1.0
info:
  title: sei-sidecar API
  description: |
    HTTP API for the sei-sidecar task executor.

    ## Authentication

    Sign-tx tasks ship UNAUTHENTICATED in Phase 1-3 of the
    governance-flow workstream — see sei-protocol/seictl#163 and #165.
    From Phase 4 a `kube-rbac-proxy` sidecar fronts this API on `:8443`
    (TokenReview + a single coarse `create seinodetasks.sei.io` SAR)
    and the sidecar rebinds to 127.0.0.1:7777, trusting `X-Remote-User`.
  version: 0.8.0
  license:
    name: Apache-2.0

servers:
  - url: http://localhost:7777

paths:
  /v0/healthz:
    get:
      operationId: healthz
      summary: Liveness probe
      description: Returns 200 after mark-ready has completed; 503 otherwise.
      responses:
        "200":
          description: Sidecar is ready.
        "503":
          description: Sidecar is not yet ready.

  /v0/status:
    get:
      operationId: getStatus
      summary: Status snapshot
      responses:
        "200":
          description: Current status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /v0/tasks:
    post:
      operationId: submitTask
      summary: Submit a task
      description: |
        Submit a task for one-time execution (201). The task type is
        carried in the body (`type` field); `params` is task-type-
        specific and validated server-side. The endpoint authorizes a
        single coarse SAR (`create seinodetasks.sei.io`) regardless of
        task type — per-task narrowing is additive via `resourceNames`
        on the ClusterRole.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskRequest"
      responses:
        "201":
          description: Task created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskSubmitResponse"
        "202":
          description: Task accepted (completed synchronously or deduplicated).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskSubmitResponse"
        "400":
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listTasks
      summary: List recent task results
      description: Returns the most recent task results.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Task results.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskResult"

  /v0/tasks/{id}:
    get:
      operationId: getTask
      summary: Get a task result
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Task result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResult"
        "404":
          description: Task not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteTask
      summary: Remove a task
      description: Removes a task result or cancels an active task.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Task deleted.
        "404":
          description: Task not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Enforced by the upstream `kube-rbac-proxy` in Phase 4+ (#165).
        In Phase 1-3 the sidecar is unauthenticated; tooling MUST NOT
        rely on this scheme for its own access control.

  schemas:
    TaskRequest:
      type: object
      required: [type]
      properties:
        id:
          type: string
          format: uuid
          description: |
            Caller-provided task identifier. When set, the engine uses
            this as the canonical ID (enabling deterministic IDs from
            the controller); if a task with this ID exists, the request
            is idempotent and returns the existing ID. When omitted, a
            random UUID is generated.
        type:
          type: string
          description: Task type identifier.
        params:
          type: object
          additionalProperties: true
          description: Task-type-specific parameters; validated server-side.

    StatusResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [Initializing, Ready]

    TaskSubmitResponse:
      type: object
      required: [id]
      properties:
        id:
          type: string
          format: uuid
          description: The assigned task UUID.

    TaskResult:
      type: object
      required: [id, type, status, submittedAt]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          description: Task type that was executed.
        status:
          type: string
          enum: [running, completed, failed]
          description: Current task lifecycle state.
        params:
          type: object
          additionalProperties: true
        error:
          type: string
          description: Error message if the task failed.
        submittedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
