openapi: 3.1.0
info:
  title: sei-sidecar API
  description: HTTP API for the sei-sidecar task executor.
  version: 0.7.0
  license:
    name: Apache-2.0

servers:
  - url: http://localhost:7777

paths:
  /v0/healthz:
    get:
      operationId: healthz
      summary: Liveness probe
      description: Returns 200 after mark-ready has completed; 503 otherwise.
      responses:
        "200":
          description: Sidecar is ready.
        "503":
          description: Sidecar is not yet ready.

  /v0/status:
    get:
      operationId: getStatus
      summary: Status snapshot
      responses:
        "200":
          description: Current status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /v0/tasks:
    post:
      operationId: submitTask
      summary: Submit a task
      description: Submit a task for one-time execution (201).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskRequest"
      responses:
        "201":
          description: Task created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskSubmitResponse"
        "202":
          description: Task accepted (completed synchronously or deduplicated).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskSubmitResponse"
        "400":
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listTasks
      summary: List recent task results
      description: Returns the most recent task results.
      responses:
        "200":
          description: Task results.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskResult"

  /v0/tasks/{id}:
    get:
      operationId: getTask
      summary: Get a task result
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Task result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResult"
        "404":
          description: Task not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteTask
      summary: Remove a task
      description: Removes a task result or cancels an active task.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Task deleted.
        "404":
          description: Task not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    TaskRequest:
      type: object
      required: [type]
      properties:
        id:
          type: string
          format: uuid
          description: >
            Caller-provided task identifier. When set, the engine uses this
            as the canonical ID (enabling deterministic IDs from the controller).
            If a task with this ID already exists, the request is idempotent
            and returns the existing ID. When omitted, a random UUID is generated.
        type:
          type: string
          description: Task type identifier.
        params:
          type: object
          additionalProperties: true

    StatusResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [Initializing, Ready]

    TaskSubmitResponse:
      type: object
      required: [id]
      properties:
        id:
          type: string
          format: uuid
          description: The assigned task UUID.

    TaskResult:
      type: object
      required: [id, type, status, submittedAt]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          description: Task type that was executed.
        status:
          type: string
          enum: [running, completed, failed]
          description: Current task lifecycle state.
        params:
          type: object
          additionalProperties: true
        error:
          type: string
          description: Error message if the task failed.
        submittedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
