# 3-doc fixture for the apply-pipeline envtest. Deployments are used
# (not ConfigMaps) because the apimachinery ConfigMap strategy does not
# call IncrementResourceGeneration on data updates — generation stays
# at 1 forever, defeating the create/update/unchanged distinction tests
# 1-3 verify. apps/v1 Deployment's strategy increments generation on
# spec changes, which is exactly the production signal we mirror.
#
# ${NAMESPACE} is substituted by the test before the bundle is fed to
# kube.Apply.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dep-alpha
  namespace: ${NAMESPACE}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dep-alpha
  template:
    metadata:
      labels:
        app: dep-alpha
    spec:
      containers:
        - name: c
          image: busybox
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dep-beta
  namespace: ${NAMESPACE}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dep-beta
  template:
    metadata:
      labels:
        app: dep-beta
    spec:
      containers:
        - name: c
          image: busybox
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dep-gamma
  namespace: ${NAMESPACE}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dep-gamma
  template:
    metadata:
      labels:
        app: dep-gamma
    spec:
      containers:
        - name: c
          image: busybox
