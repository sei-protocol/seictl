# Source: sei-protocol/platform autobake/templates/seinodedeployment.yaml
# Vars: CHAIN_ID, NAMESPACE, ENGINEER_ALIAS, NAME, SEID_IMAGE,
#       IMAGE_DIGEST_SHORT, RPC_COUNT, PART_OF
# RPC fleet — block-syncs from validators and serves EVM JSON-RPC.
# Inherits genesis from the validator SND's ceremony via S3.
apiVersion: sei.io/v1alpha1
kind: SeiNodeDeployment
metadata:
  name: ${CHAIN_ID}-rpc
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/managed-by: seictl
    app.kubernetes.io/part-of: ${PART_OF}
    app.kubernetes.io/component: rpc
    sei.io/chain-id: ${CHAIN_ID}
    sei.io/engineer: ${ENGINEER_ALIAS}
    sei.io/bench-name: ${NAME}
    sei.io/image-sha: ${IMAGE_DIGEST_SHORT}
    sei.io/role: rpc
spec:
  replicas: ${RPC_COUNT}
  deletionPolicy: Delete
  updateStrategy:
    type: InPlace
  template:
    metadata:
      labels:
        sei.io/chain-id: ${CHAIN_ID}
        sei.io/engineer: ${ENGINEER_ALIAS}
        sei.io/bench-name: ${NAME}
        sei.io/role: rpc
    spec:
      chainId: ${CHAIN_ID}
      image: ${SEID_IMAGE}
      entrypoint:
        command: ["seid"]
        args: ["start", "--home", "/sei"]
      peers:
        - label:
            selector:
              sei.io/nodedeployment: ${CHAIN_ID}
      fullNode: {}
      overrides:
        evm.ws_enabled: "true"
