openapi: 3.1.0
info:
  title: sei-sidecar API
  description: HTTP API for the sei-sidecar task executor and scheduler.
  version: 0.2.0
  license:
    name: Apache-2.0

servers:
  - url: http://localhost:7777

paths:
  /healthz:
    get:
      operationId: healthz
      summary: Liveness probe
      description: Returns 200 after mark-ready has completed; 503 otherwise.
      responses:
        "200":
          description: Sidecar is ready.
        "503":
          description: Sidecar is not yet ready.

  /status:
    get:
      operationId: getStatus
      summary: Status snapshot
      responses:
        "200":
          description: Current status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /task:
    post:
      operationId: submitTask
      summary: Submit a task or create a cron schedule
      description: |
        If `schedule` is provided (a cron expression), a recurring schedule is
        created and 201 is returned with the schedule object. Otherwise the
        task is submitted for immediate execution and 202 is returned.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskRequest"
      responses:
        "201":
          description: Cron schedule created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"
        "202":
          description: Task submitted for immediate execution.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    enum: [submitted]
        "400":
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: A task is already running.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /schedules:
    get:
      operationId: listSchedules
      summary: List all schedules
      responses:
        "200":
          description: All schedules.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Schedule"

  /schedules/{scheduleId}:
    delete:
      operationId: deleteSchedule
      summary: Remove a schedule
      parameters:
        - name: scheduleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Schedule deleted.
        "404":
          description: Schedule not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    TaskRequest:
      type: object
      required: [type]
      properties:
        type:
          type: string
          description: Task type identifier.
        params:
          type: object
          additionalProperties: true
        schedule:
          type: string
          description: Cron expression. If set, creates a recurring schedule instead of running immediately.

    StatusResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ready, running, not_ready]
        lastTask:
          $ref: "#/components/schemas/TaskResult"

    TaskResult:
      type: object
      required: [type]
      properties:
        type:
          type: string
          description: Task type that was executed.
        error:
          type: string
          description: Error message if the task failed.

    Schedule:
      type: object
      required: [id, taskType, cron, createdAt]
      properties:
        id:
          type: string
          format: uuid
        taskType:
          type: string
        params:
          type: object
          additionalProperties: true
        cron:
          type: string
        lastRunAt:
          type: string
          format: date-time
        nextRunAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
